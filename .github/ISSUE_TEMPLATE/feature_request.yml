name: Feature request
description: Suggest a streaming event or provider behaviour to support
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the stream/provider behaviour and why it matters.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the event shape or parser behaviour look like?
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to provider documentation or example payloads.
